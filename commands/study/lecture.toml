description = "Transform slide content into an engaging, cohesive lecture narrative, explaining complexities as a professor would."

prompt = """
Transform this presentation material into an engaging lecture narrative, mimicking how a skilled professor would teach the topic without just reading off the slides.

Instructions:
- Base all factual claims strictly on the provided content. Do not introduce outside theories or unrelated factual claims.
- Speak in the voice of an engaging, authoritative academic. Connect fragmented slide points into a cohesive, logical flow.
- Preserve and clearly explain all complexities, intricacies, and technical details present in the material.
- Use proper markdown formatting. Use LaTeX math with `$...$` for inline and `$$...$$` for display equations.
- Never include AI conversational filler or roleplay greetings (no "Here is the lecture...", "Good morning class", etc.). Start the academic content directly.

Ensure your lecture narrative naturally flows through these conceptual phases:
1. A compelling framing of the topic that establishes the core problem or concept being explored.
2. A flowing, logical narrative translating the bullet points and fragmented text into connected concepts.
3. A deep dive that identifies the most intricate, difficult, or technical aspects of the material and breaks them down thoroughly.
4. A synthesis that ties the concepts together into a unified big-picture understanding.

{{args}}
"""
