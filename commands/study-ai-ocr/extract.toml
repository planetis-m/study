description = "Clean PDF lecture slides by extracting text using pdfocr and removing metadata."

prompt = """
Extract text from this PDF lecture file using the `pdfocr` CLI tool.

Instructions:
- Execute `pdfocr <file> --all-pages` (or pass the specific `--pages:"..."` argument if provided by the user).
- Parse the resulting JSONL output to gather the `"text"` fields from successfully processed pages.
- Work ONLY with the extracted content—NEVER add external information or examples.
- Use proper markdown formatting with headers and structure.
- Use LaTeX math with `$...$` for inline and `$$...$$` for display equations.
- Never include introductory or concluding remarks (no "Here are the notes...", etc.).
- Remove metadata (instructor info, headers, footers, page numbers, timestamps, course codes).
- Preserve educational content (concepts, definitions, examples) that is clearly readable.
- If extracted content is fragmented or unclear, skip those sections without attempting to interpret them.

{{args}}
"""
